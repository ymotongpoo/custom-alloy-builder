name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  golden:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        alloy-version: [v1.17.1, v1.16.3, v1.15.1]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Check golden serializer output
        working-directory: frontend
        run: npm run golden
      - name: Cache Alloy ${{ matrix.alloy-version }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/custom-alloy-builder/bin/${{ matrix.alloy-version }}/alloy
          key: alloy-${{ matrix.alloy-version }}-linux-amd64
      - name: Install Alloy ${{ matrix.alloy-version }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/custom-alloy-builder/bin/${{ matrix.alloy-version }}" "$HOME/.cache/custom-alloy-builder/downloads/${{ matrix.alloy-version }}"
          if [ ! -x "$HOME/.cache/custom-alloy-builder/bin/${{ matrix.alloy-version }}/alloy" ]; then
            curl -fsSL \
              -o "$HOME/.cache/custom-alloy-builder/downloads/${{ matrix.alloy-version }}/alloy-linux-amd64.zip" \
              "https://github.com/grafana/alloy/releases/download/${{ matrix.alloy-version }}/alloy-linux-amd64.zip"
            unzip -o "$HOME/.cache/custom-alloy-builder/downloads/${{ matrix.alloy-version }}/alloy-linux-amd64.zip" -d "$HOME/.cache/custom-alloy-builder/downloads/${{ matrix.alloy-version }}/alloy"
            install -m 0755 "$HOME/.cache/custom-alloy-builder/downloads/${{ matrix.alloy-version }}/alloy/alloy-linux-amd64" "$HOME/.cache/custom-alloy-builder/bin/${{ matrix.alloy-version }}/alloy"
          fi
          "$HOME/.cache/custom-alloy-builder/bin/${{ matrix.alloy-version }}/alloy" --version
      - name: Validate golden Alloy fixtures
        run: |
          set -euo pipefail
          for fixture in testdata/golden/*.alloy; do
            "$HOME/.cache/custom-alloy-builder/bin/${{ matrix.alloy-version }}/alloy" validate "$fixture"
          done

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
